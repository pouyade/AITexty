name: Build universal APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Re-runs append -build.<run> to avoid duplicate-tag errors.'
        required: true
        default: 'v1.0.0'
      create_release:
        description: 'Publish GitHub Release with APK'
        type: boolean
        default: true
      draft:
        description: 'Create release as draft'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build universal APK
        run: ./gradlew :app:fatApk --no-daemon

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aitexty-universal-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Resolve release tag
        id: release
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}-build.${{ github.run_number }}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "publish=${{ inputs.create_release }}" >> "$GITHUB_OUTPUT"
            echo "draft=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
            echo "Manual run → tag ${TAG}, publish=${{ inputs.create_release }}"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "Tag push → release ${GITHUB_REF_NAME}"
          fi

      - name: Create GitHub Release
        if: steps.release.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: AITexty ${{ steps.release.outputs.tag }}
          files: dist/*.apk
          generate_release_notes: true
          make_latest: ${{ steps.release.outputs.draft != 'true' }}
          draft: ${{ steps.release.outputs.draft == 'true' }}
